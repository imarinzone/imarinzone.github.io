<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b0f14" />
  <title>Arindam Kumar Nath — Software Developer</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="icon" type="image/x-icon" href="./favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="theme-dark">
  <header class="site-header">
    <div class="container header-inner">
      <a href="#top" class="brand" aria-label="Home">
        <span class="brand-dot" aria-hidden="true"></span>
        <span class="brand-name" data-name>Arindam Kumar Nath</span>
      </a>
      <nav class="nav">
        <a href="#featured" class="nav-link">Featured</a>
        <a href="#experience" class="nav-link">Experience</a>
        <a href="#projects" class="nav-link">Projects</a>
        <a href="#skills" class="nav-link">Skills</a>
        <div class="color-palette-wrapper">
          <button id="paletteToggle" class="icon-btn" aria-label="Color palette" title="Color palette">
            <span class="icon">🎨</span>
          </button>
          <div id="paletteMenu" class="palette-menu">
            <div class="palette-options">
              <button class="palette-option active" data-palette="default">
                <span class="palette-preview">
                  <span class="palette-color" style="background: #ffffff;"></span>
                  <span class="palette-color" style="background: #000000;"></span>
                </span>
                <span>Default</span>
              </button>
              <button class="palette-option" data-palette="blue">
                <span class="palette-preview">
                  <span class="palette-color" style="background: #60a5fa;"></span>
                  <span class="palette-color" style="background: #1e40af;"></span>
                </span>
                <span>Blue</span>
              </button>
              <button class="palette-option" data-palette="purple">
                <span class="palette-preview">
                  <span class="palette-color" style="background: #a78bfa;"></span>
                  <span class="palette-color" style="background: #6b21a8;"></span>
                </span>
                <span>Purple</span>
              </button>
              <button class="palette-option" data-palette="green">
                <span class="palette-preview">
                  <span class="palette-color" style="background: #4ade80;"></span>
                  <span class="palette-color" style="background: #166534;"></span>
                </span>
                <span>Green</span>
              </button>
              <button class="palette-option" data-palette="red">
                <span class="palette-preview">
                  <span class="palette-color" style="background: #f87171;"></span>
                  <span class="palette-color" style="background: #991b1b;"></span>
                </span>
                <span>Red</span>
              </button>
              <button class="palette-option" data-palette="orange">
                <span class="palette-preview">
                  <span class="palette-color" style="background: #fb923c;"></span>
                  <span class="palette-color" style="background: #9a3412;"></span>
                </span>
                <span>Orange</span>
              </button>
            </div>
          </div>
        </div>
        <button id="themeToggle" class="icon-btn" aria-label="Toggle theme" title="Toggle theme">
          <span class="icon">☾</span>
        </button>
        <a class="btn btn-primary" id="emailLink" target="_blank" rel="noopener">Email</a>
      </nav>
    </div>
  </header>

  <main id="top">
    <section class="hero">
      <div class="container hero-inner">
        <div class="hero-text">
          <h1 class="hero-title"><span data-name>Arindam Kumar Nath</span></h1>
          <p class="hero-subtitle" data-headline>Software Developer</p>
          <p class="hero-summary" id="summaryText"></p>
          <div class="hero-ctas">
            <a id="githubLink" class="btn btn-ghost" target="_blank" rel="noopener">GitHub</a>
            <a id="linkedinLink" class="btn btn-ghost" target="_blank" rel="noopener">LinkedIn</a>
          </div>
        </div>
        <div class="hero-art" aria-hidden="true">
          <div class="orb orb-1"></div>
          <div class="orb orb-2"></div>
          <div class="grid-glow"></div>
          <div class="profile-art" id="profileArt"></div>
        </div>
      </div>
    </section>

    <section id="featured" class="section">
      <div class="container">
        <div class="section-head">
          <h2>Featured: Cloud‑Native Backend</h2>
        </div>
        <div class="chip-row" id="topicChips"></div>
        <div class="card-grid" id="topicGrid"></div>
      </div>
    </section>

    <section id="experience" class="section">
      <div class="container">
        <div class="section-head">
          <h2>Experience</h2>
        </div>
        <div id="experienceList" class="timeline"></div>
      </div>
    </section>

    <section id="projects" class="section">
      <div class="container">
        <div class="section-head">
          <h2>Projects</h2>
        </div>
        <div id="projectsGrid" class="card-grid projects"></div>
      </div>
    </section>

    <section id="education" class="section">
      <div class="container">
        <div class="section-head">
          <h2>Education</h2>
        </div>
        <div id="educationList" class="edu-list"></div>
      </div>
    </section>

    <section id="skills" class="section">
      <div class="container">
        <div class="section-head">
          <h2>Skills</h2>
        </div>
        <div id="skillsCloud" class="skills-cloud"></div>
      </div>
    </section>

    <section id="languages" class="section">
      <div class="container">
        <div class="section-head">
          <h2>Languages</h2>
        </div>
        <div id="languagesList" class="languages-list"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div>
        <strong>Open to backend and platform roles</strong>
        <div class="muted" id="footerLocation">Remote friendly</div>
      </div>
      <div class="footer-links">
        <a id="footerGithub" target="_blank" rel="noopener">GitHub</a>
        <a id="footerLinkedin" target="_blank" rel="noopener">LinkedIn</a>
        <a id="footerEmail" target="_blank" rel="noopener">Email</a>
      </div>
    </div>
  </footer>

  <script src="./config.js"></script>
  <script src="./app.js" type="module"></script>
</body>
</html>
